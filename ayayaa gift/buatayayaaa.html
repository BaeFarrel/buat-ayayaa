<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For my bini kesayangan aku ayayaa</title>

<style>

html, body {
  height: 100%;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #2b0a3d, #05010a);
  color: white;
  overflow-x: hidden;
}

/* START */
#start {
  position: fixed;
  inset: 0;
  min-height: 100dvh;
  background: #05010a;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  text-align: center;
  padding: 30px;
}

#start h2 {
  color: #a855f7;
}

#start button {
  padding: 14px 30px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: #7c3aed;
  color: white;
  font-size: 18px;
}

/* MAIN */
.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 60px 15px;
  box-sizing: border-box;
}

.card {
  max-width: 650px;
  width: 100%;
  opacity: 0;
  transform: translateY(20px);
  transition: 1.5s ease;
}

h1 {
  color: #a855f7;
  font-size: 20px;
  opacity: 0;
  animation: fadeIn 2s forwards;
}

.photo-wrap {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 15px;
}

.photo {
  width: 140px;
  height: 180px;
  object-fit: cover;
  border-radius: 18px;
  border: 2px solid #a855f7;
}

#text {
  font-size: 15px;
  line-height: 1.8;
  white-space: pre-line;
  min-height: 250px;
}

@keyframes fadeIn {
  to {opacity: 1;}
}

/* HEART */
.heart {
  position: fixed;
  color: rgba(168,85,247,0.25);
  font-size: 18px;
  animation: float 6s infinite ease-in-out;
  pointer-events: none;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-60px);}
  100% {transform: translateY(0);}
}

#end {
  margin-top: 15px;
  opacity: 0;
  transition: 2s;
  color: #d6d3d1;
  font-size: 0.9em;
}

</style>
</head>

<body>

<!-- OPEN -->
<div id="start">
  <h2>for my bini kesayangan aku ayayaa💜</h2>
  <p style="opacity:0.7; color:#a855f7;">muhammad ada sesuatu buat kamu</p>
  <button onclick="openGift()">open</button>
</div>

<!-- HEARTS -->
<div class="heart" style="top:5%; left:10%">❤</div>
<div class="heart" style="top:10%; left:80%">❤</div>
<div class="heart" style="top:15%; left:40%">❤</div>
<div class="heart" style="top:25%; left:70%">❤</div>
<div class="heart" style="top:35%; left:20%">❤</div>
<div class="heart" style="top:45%; left:90%">❤</div>
<div class="heart" style="top:55%; left:35%">❤</div>
<div class="heart" style="top:65%; left:75%">❤</div>
<div class="heart" style="top:75%; left:15%">❤</div>
<div class="heart" style="top:85%; left:60%">❤</div>
<div class="heart" style="top:95%; left:30%">❤</div>

<!-- MAIN -->
<div class="container">
  <div class="card" id="card">

    <h1>for my bini kesayangan aku ayayaa💜</h1>

    <div class="photo-wrap">
      <img src="./aya1.jpg" class="photo">
      <img src="./aya2.jpg" class="photo">
    </div>

    <div id="text"></div>
    <div id="end">makasih ya sayangg udah baca 💜</div>

  </div>
</div>

<!-- 🎹 BACKSOUND (INI BAGIAN PENTING) -->
<audio id="music" loop>
  <source src="./lagu.mp3" type="audio/mpeg">
</audio>

<script>

const message = `kesayangannya aku, yang mulia ratu, kecintaannya aku, my bini nya aku, tanaya raissa priscilla, rafaela, ayayaa

maaf ya kalau jelek dan sederhana, aku lagi pake skill coding yang baru aku pelajarin, kamu inget kan waktu itu aku ngerjain tugas coding kamu nyemangatin aku, makanya aku bisa semangat belajar coding.
aku jadi inget hari-hari yang udah kita lewatin bareng hehe.

baca ini pelan-pelan aja ya sayang.

aku engga sepenuhnya tau apa yang kamu rasain sekarang, tapi aku tau kamu lagi ga baik-baik aja, kamu itu cewe yang kuat, aku tau kamu bisa lewatin ini pelan-pelan, dan aku harap kamu bisa ngerasa agak lebih baik.

aku di sini bukan buat nyalahin kamu atau maksa kamu harus baik-baik aja sekarang.

aku cuma pengen bilang aku engga pernah nganggep kamu beban, dan aku ngga pernah ngerasa kamu nyakitin aku.
kalau selama ini ada yang bikin kita capek, itu bukan karena kamu kurang atau salah, tapi kita lagi sama-sama belajar cara ngerti satu sama lain.

aku juga minta maaf kalau aku selama ini bikin kamu ngerasa berat. untuk sekarang, tenangin diri kamu dulu aja, engga perlu buru-buru

kalau udah lebih enakan, aku masih ada disini dan bakal selalu ada di sini buat kamu.

i will always love u more sayang 💜💜💜`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 22);
  } else {
    document.getElementById("end").style.opacity = 1;
  }
}

function openGift() {
  document.getElementById("start").style.opacity = 0;

  setTimeout(() => {
    document.getElementById("start").style.display = "none";
    document.getElementById("card").style.opacity = 1;

    const music = document.getElementById("music");
    music.volume = 0.5; // volume lembut
    music.play();

    typeWriter();
  }, 800);
}

</script>

</body>
</html>
